<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kivifano</title>
      <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Montserrat&family=Dancing+Script&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #858EA9;
            --bg: hsl(225, 17%, 59%);
            --bg2: hsla(223, 23%, 30%, 0.35);
        }
        body {
            margin: 0;
            background-color: var(--bg);
        }
        .background {
            position: fixed;
            width: 100vw;
            height: 100vh;
            background: #858EA9;
            overflow: hidden;
            z-index: -1;
        }

        .bg-text {
            position: absolute;
            color: var(--bg2); /* slightly darker + soft */
            user-select: none;
            /* pointer-events: none; */
            transition: filter 300ms ease-in-out;
        }
        .bg-text:hover {
            filter: blur(2px);
        }
        .t1 {
            top: 10%;
            left: 15%;
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            transform: rotate(-15deg);
        }

        .t2 {
            top: 40%;
            left: 60%;
            font-family: 'Montserrat', sans-serif;
            font-size: 36px;
            transform: rotate(25deg);
        }

        .t3 {
            top: 70%;
            left: 30%;
            font-family: 'Dancing Script', cursive;
            font-size: 42px;
            transform: rotate(-40deg);
        }

        .t4 {
            top: 20%;
            left: 75%;
            font-family: 'Playfair Display', serif;
            font-size: 30px;
            transform: rotate(90deg);
        }

        .t5 {
            top: 80%;
            left: 80%;
            font-family: 'Montserrat', sans-serif;
            font-size: 28px;
            transform: rotate(-10deg);
        }

        .t6 {
            top: 55%;
            left: 10%;
            font-family: 'Dancing Script', cursive;
            font-size: 50px;
            transform: rotate(15deg);
        }
        main {
            height: 100vh;
            width: 100vw;
            box-sizing: border-box;
            display: flex; align-items: center; justify-content: center;
        }
        .card {
            min-height: 100px; min-width: 200px;
            padding: 8px;
            background-color: #fff;
            box-shadow: 2px 2px 2px 0px #9993;
            border-radius: 8px;
        }
        .card * {
            text-align: center;
        }

    </style>
</head>
<body>
    <div class="background">
        <span class="bg-text t1">Kivifano</span>
        <span class="bg-text t2">Kivifano</span>
        <span class="bg-text t3">Kivifano</span>
        <span class="bg-text t4">Kivifano</span>
        <span class="bg-text t5">Kivifano</span>
        <span class="bg-text t6">Kivifano</span>
    </div>

    <main>
        <div id="RelationshipCard" class="card">
            <h3>Days Together</h3>
            <div id="RelationshipCount"></div>
        </div>
    </main>
    

    <script>
        const presets = {
            "filter": ["blur(0px)", "blur(1px)", "blur(2px)"],
            "font-family": ["'Playfair Display', serif", "'Montserrat', sans-serif", "'Dancing Script', cursive"],
            "top": ["10%", "40%", "70%", "20%", "80%", "55%"],
            "left": ["15%", "60%", "30%", "75%", "80%", "10%"],
            "font-size": ["48px", "36px", "42px", "30px", "28px", "50px"],
            "transform": ["rotate(-15deg)", "rotate(25deg)", "rotate(-40deg)", "rotate(90deg)", "rotate(-10deg)", "rotate(15deg)"],
        }

        const kivifanoLaunch = new Date("March 17, 2026 17:17:17 GMT-05:00");
        const kivifanoLaunch2 = new Date("March 17, 2026 14:11:00 GMT-05:00");
        const mili2days = 86400000;
        const hoursPerDay = 24;
        function UpdateTimeInCard(cardDate){
            let cardCount = document.getElementById("RelationshipCount");
            
            let timeSince = Date.now() - cardDate.getTime();
            let totalDaysSince = timeSince / mili2days;
            let days = Math.floor(totalDaysSince);
            let hours = Math.floor((totalDaysSince - days)*hoursPerDay);
            let minutes = Math.floor((((totalDaysSince - days)*hoursPerDay)-hours)*60);
            let seconds = Math.floor((((((totalDaysSince - days)*hoursPerDay)-hours)*60) - minutes) * 60);
            
            // let hms = totalDaysSince - days;
            // let totalDaysSince2 = (Date.now() - kivifanoLaunch2.getTime()) / mili2days;
            // let hms2 = totalDaysSince2 - Math.floor(totalDaysSince2);
            // console.log(`hms: ${hms}, hms2: ${hms2}`);

            const toNow = new Date(Date.now());
            let todayYear = toNow.getFullYear();
            let todayMonth = toNow.getMonth();
            let todayDay = toNow.getDate();
            // let todayDay2 = Math.floor(toNow.getDate() - hms2);

            let dateYear = cardDate.getFullYear();
            let dateMonth = cardDate.getMonth();
            let dateDay = cardDate.getDate();

            let monthsSince = ((todayYear - dateYear)*12) + (todayMonth - dateMonth);
            let daysSince = (todayDay - dateDay);
            // let daysSince = (todayDay2 - dateDay);
            

            // let displayText = `${days} days, ${hours} hours, ${minutes} minutes, and ${seconds} seconds.`;
            // let displayText = `${days} days, ${hours}h:${minutes}m:${seconds}s`;
            let displayText = `<div>${monthsSince} months and ${daysSince} days!</div>
            <div>or ${days} days, ${hours}h:${minutes}m:${seconds}s</div>`;
            console.log(displayText);
            cardCount.innerHTML = displayText;
        }
        const refreshTime = 1000;
        function update(){
            UpdateTimeInCard(kivifanoLaunch);
            setTimeout(() => {
                requestAnimationFrame(update);
            }, refreshTime);
        }

        window.addEventListener('load', (ev) => {
            console.log(`Welcome to Kivifano!`);
            UpdateTimeInCard(kivifanoLaunch);
            update();
        });

    </script>
</body>
</html>
